<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Page Not Found — Action Sports Safety Project</title>
  <meta name="description" content="The page you were looking for doesn't exist." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--s-8);
      background: var(--c-surface);
    }
    .error-code {
      font-family: var(--f-mono);
      font-size: var(--t-3xl);
      font-weight: 500;
      color: var(--c-primary);
      margin-bottom: var(--s-4);
      font-variant-numeric: tabular-nums;
    }
    .error-title {
      font-family: var(--f-display);
      font-size: var(--t-2xl);
      font-weight: 400;
      color: var(--c-text);
      margin-bottom: var(--s-4);
    }
    .error-body {
      font-size: var(--t-base);
      line-height: 1.65;
      color: var(--c-text-2);
      max-width: 40ch;
      margin-bottom: var(--s-10);
    }
  </style>
</head>
<body>
  <main class="error-page" id="main-content">
    <p class="error-code" aria-hidden="true">404</p>
    <h1 class="error-title">Page not found</h1>
    <p class="error-body">
      The page you are looking for does not exist or has been moved.
    </p>
    <a href="/" class="btn btn-terra">Back to home</a>
  </main>
</body>
</html>
